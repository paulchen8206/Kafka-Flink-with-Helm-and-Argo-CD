apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: realtime-prd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<your-org>/Kafka-Flink-with-Helm-ArgoCD.git
    targetRevision: HEAD
    path: charts/realtime-app
    helm:
      releaseName: realtime-prd
      valueFiles:
      - ../../environments/prd/values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: realtime-prd
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
    - CreateNamespace=true