  service:
    type: ClusterIP
    port: 8080
mdm:
  enabled: false
  mysql:
    image:
      repository: mysql
      tag: "8.4"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 3306
    rootPassword: mdmroot
    database: mdm
    serverId: "223344"
  writer:
    replicas: 1
    image:
      repository: realtime-sales-mdm-writer
      tag: 0.1.0
      pullPolicy: IfNotPresent
    writeIntervalMs: 3000
  connect:
    replicas: 1
    image:
      repository: quay.io/debezium/connect
      tag: "3.0"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 8083
    groupId: mdm-connect-cluster
    configStorageTopic: mdm-connect-configs
    offsetStorageTopic: mdm-connect-offsets
    statusStorageTopic: mdm-connect-status
    curlImage:
      repository: curlimages/curl
      tag: 8.12.1
      pullPolicy: IfNotPresent
