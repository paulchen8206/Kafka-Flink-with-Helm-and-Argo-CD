  rootPassword: minio123
  bucket: warehouse
  service:
    type: ClusterIP
    apiPort: 9000
    consolePort: 9001
trino:
  enabled: false
  image:
    repository: trinodb/trino
    tag: "472"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
postgres:
  enabled: false
