    repository: curlimages/curl
    tag: 8.12.1
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8083
  groupId: connect-cluster-1
  configStorageTopic: connect-configs
  offsetStorageTopic: connect-offsets
  statusStorageTopic: connect-status
dbt:
