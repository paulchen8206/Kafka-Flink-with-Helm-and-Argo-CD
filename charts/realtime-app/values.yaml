nameOverride: ""
fullnameOverride: ""
producer:
  enabled: true
  replicas: 1
  image:
    repository: realtime-sales-producer
    tag: 0.1.0
    pullPolicy: IfNotPresent
  intervalMs: 1500
  rawTopic: raw_sales_orders
processor:
  enabled: true
  replicas: 1
  image:
    repository: realtime-sales-processor
    tag: 0.1.0
    pullPolicy: IfNotPresent
  topics:
    rawSalesOrders: raw_sales_orders
    salesOrder: sales_order
    salesOrderLineItem: sales_order_line_item
    customerSales: customer_sales
  consumerGroupId: realtime-flink-processor
  checkpointIntervalMs: 10000
icebergWriter:
  enabled: false
  replicas: 1
  image:
    repository: realtime-sales-iceberg-writer
    tag: 0.1.0
    pullPolicy: IfNotPresent
  groupId: iceberg-writer
  offsetReset: earliest
  batchSize: 50
  pollTimeoutMs: 1000
  flushIntervalMs: 5000
  catalog: lakehouse
  schema: streaming
kafkaUi:
  enabled: false
  replicas: 1
  image:
    repository: provectuslabs/kafka-ui
    tag: v0.7.2
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
minio:
  enabled: false
  image:
    repository: minio/minio
    tag: latest
    pullPolicy: IfNotPresent
  mcImage:
    repository: minio/mc
    tag: latest
    pullPolicy: IfNotPresent
