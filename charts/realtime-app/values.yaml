    enabled: true
    image:
      repository: grafana/promtail
      tag: 2.9.8
      pullPolicy: IfNotPresent
  grafana:
    replicas: 1
    image:
      repository: grafana/grafana
      tag: 11.1.0
      pullPolicy: IfNotPresent
    adminUser: admin
    adminPassword: admin
    service:
      type: ClusterIP
      port: 3000
kafkaBootstrapServers: kafka:9092
kafka:
  enabled: false
  listeners:
    client:
      protocol: PLAINTEXT
  controller:
    replicaCount: 1
  broker:
    replicaCount: 1
  kraft:
    enabled: true
  provisioning:
    enabled: true
    numPartitions: 3
    replicationFactor: 1
    topics:
    - name: raw_sales_orders
      partitions: 3
      replicationFactor: 1
    - name: sales_order
      partitions: 3
      replicationFactor: 1
    - name: sales_order_line_item
      partitions: 3
      replicationFactor: 1
    - name: customer_sales
      partitions: 3
      replicationFactor: 1
    - name: mdm_customer
      partitions: 3
      replicationFactor: 1
    - name: mdm_product
      partitions: 3
      replicationFactor: 1
    - name: mdm_mysql.mdm.customer360
      partitions: 3
      replicationFactor: 1
    - name: mdm_mysql.mdm.product_master
      partitions: 3
      replicationFactor: 1
    - name: connect-configs
      partitions: 1
      replicationFactor: 1
      config:
        cleanup.policy: compact
    - name: connect-offsets
      partitions: 6
      replicationFactor: 1
      config:
        cleanup.policy: compact
    - name: connect-status
      partitions: 3
      replicationFactor: 1
      config:
        cleanup.policy: compact
    - name: connect-iceberg-control
      partitions: 3
      replicationFactor: 1
    - name: mdm-connect-configs
      partitions: 1
      replicationFactor: 1
      config:
        cleanup.policy: compact
    - name: mdm-connect-offsets
      partitions: 6
      replicationFactor: 1
      config:
        cleanup.policy: compact
    - name: mdm-connect-status
      partitions: 3
      replicationFactor: 1
      config:
        cleanup.policy: compact