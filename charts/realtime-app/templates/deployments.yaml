{{- if .Values.producer.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "realtime-app.fullname" . }}-producer
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: producer
spec:
  replicas: {{ .Values.producer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "realtime-app.name" . }}
      app.kubernetes.io/component: producer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "realtime-app.name" . }}
        app.kubernetes.io/component: producer
    spec:
      containers:
        - name: producer
          image: {{ .Values.producer.image.repository }}:{{ .Values.producer.image.tag }}
          imagePullPolicy: {{ .Values.producer.image.pullPolicy }}
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafkaBootstrapServers | quote }}
            - name: RAW_TOPIC
              value: {{ .Values.producer.rawTopic | quote }}
            - name: PRODUCER_INTERVAL_MS
              value: {{ .Values.producer.intervalMs | quote }}
---
{{- end }}
{{- if .Values.kafkaUi.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "realtime-app.fullname" . }}-kafka-ui
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: kafka-ui
spec:
  replicas: {{ .Values.kafkaUi.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "realtime-app.name" . }}
      app.kubernetes.io/component: kafka-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "realtime-app.name" . }}
        app.kubernetes.io/component: kafka-ui
    spec:
      containers:
        - name: kafka-ui
          image: {{ .Values.kafkaUi.image.repository }}:{{ .Values.kafkaUi.image.tag }}
          imagePullPolicy: {{ .Values.kafkaUi.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: realtime-dev
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: {{ .Values.kafkaBootstrapServers | quote }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "realtime-app.fullname" . }}-kafka-ui
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: kafka-ui
spec:
  type: {{ .Values.kafkaUi.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: kafka-ui
  ports:
    - name: http
      port: {{ .Values.kafkaUi.service.port }}
      targetPort: 8080
{{- end }}
{{- if .Values.processor.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "realtime-app.fullname" . }}-processor
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: processor
spec:
  replicas: {{ .Values.processor.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "realtime-app.name" . }}
      app.kubernetes.io/component: processor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "realtime-app.name" . }}
        app.kubernetes.io/component: processor
    spec:
      containers:
        - name: processor
          image: {{ .Values.processor.image.repository }}:{{ .Values.processor.image.tag }}
          imagePullPolicy: {{ .Values.processor.image.pullPolicy }}
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafkaBootstrapServers | quote }}
            - name: APP_RAW_SALES_ORDERS_TOPIC
              value: {{ .Values.processor.topics.rawSalesOrders | quote }}
            - name: APP_SALES_ORDER_TOPIC
              value: {{ .Values.processor.topics.salesOrder | quote }}
            - name: APP_SALES_ORDER_LINE_ITEM_TOPIC
              value: {{ .Values.processor.topics.salesOrderLineItem | quote }}
            - name: APP_CUSTOMER_SALES_TOPIC
              value: {{ .Values.processor.topics.customerSales | quote }}
            - name: APP_CONSUMER_GROUP_ID
              value: {{ .Values.processor.consumerGroupId | quote }}
            - name: APP_CHECKPOINT_INTERVAL_MS
              value: {{ .Values.processor.checkpointIntervalMs | quote }}
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "realtime-app.fullname" . }}-processor
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: processor
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: processor
  ports:
    - name: http
      port: 8080
      targetPort: 8080
{{- end }}
{{- if .Values.icebergWriter.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "realtime-app.fullname" . }}-iceberg-writer
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: iceberg-writer
spec:
  replicas: {{ .Values.icebergWriter.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "realtime-app.name" . }}
      app.kubernetes.io/component: iceberg-writer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "realtime-app.name" . }}
        app.kubernetes.io/component: iceberg-writer
    spec:
      containers:
        - name: iceberg-writer
          image: {{ .Values.icebergWriter.image.repository }}:{{ .Values.icebergWriter.image.tag }}
          imagePullPolicy: {{ .Values.icebergWriter.image.pullPolicy }}
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafkaBootstrapServers | quote }}
            - name: ICEBERG_WRITER_GROUP_ID
              value: {{ .Values.icebergWriter.groupId | quote }}
            - name: ICEBERG_WRITER_OFFSET_RESET
              value: {{ .Values.icebergWriter.offsetReset | quote }}
            - name: ICEBERG_WRITER_BATCH_SIZE
              value: {{ .Values.icebergWriter.batchSize | quote }}
            - name: ICEBERG_WRITER_POLL_TIMEOUT_MS
              value: {{ .Values.icebergWriter.pollTimeoutMs | quote }}
            - name: ICEBERG_WRITER_FLUSH_INTERVAL_MS
              value: {{ .Values.icebergWriter.flushIntervalMs | quote }}
            - name: TRINO_URL
              value: http://{{ include "realtime-app.fullname" . }}-trino:8080
            - name: TRINO_USER
              value: analytics
            - name: ICEBERG_CATALOG
              value: {{ .Values.icebergWriter.catalog | quote }}
            - name: ICEBERG_SCHEMA
              value: {{ .Values.icebergWriter.schema | quote }}
{{- end }}
