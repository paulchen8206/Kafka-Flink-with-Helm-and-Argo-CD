{{- if .Values.observability.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "realtime-app.fullname" . }}-prometheus-config
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090
      - job_name: realtime-app-static
        static_configs:
          - targets:
              - {{ include "realtime-app.fullname" . }}-processor:8080
              - {{ include "realtime-app.fullname" . }}-kafka-ui:8080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "realtime-app.fullname" . }}-loki-config
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: loki
data:
  loki.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    common:
      instance_addr: 127.0.0.1
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: index_
            period: 24h
    storage_config:
      filesystem:
        directory: /loki/chunks
    analytics:
      reporting_enabled: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "realtime-app.fullname" . }}-grafana-datasources
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://{{ include "realtime-app.fullname" . }}-prometheus:9090
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://{{ include "realtime-app.fullname" . }}-loki:3100
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "realtime-app.fullname" . }}-grafana-dashboard-provider
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: realtime-app-starter
        orgId: 1
        folder: Realtime App
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "realtime-app.fullname" . }}-grafana-dashboard-starter
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: grafana
data:
  realtime-starter.json: |
    {
      "id": null,
      "uid": "realtime-starter",
      "title": "Realtime App Starter",
      "tags": ["realtime", "starter"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": {
        "from": "now-15m",
        "to": "now"
      },
      "templating": {
        "list": []
      },
      "panels": [
        {
          "id": 1,
          "title": "Targets Up",
          "type": "timeseries",
          "datasource": "Prometheus",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "targets": [
            {
              "expr": "sum by (job) (up)",
              "legendFormat": "job",
              "refId": "A"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "none"
            },
            "overrides": []
          }
        },
        {
          "id": 2,
          "title": "Prometheus Scrape Samples",
          "type": "timeseries",
          "datasource": "Prometheus",
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 12,
            "y": 0
          },
          "targets": [
            {
              "expr": "rate(scrape_samples_scraped[5m])",
              "legendFormat": "job",
              "refId": "A"
            }
          ],
          "options": {
            "legend": {
              "displayMode": "list",
              "placement": "bottom"
            }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "ops"
            },
            "overrides": []
          }
        },
        {
          "id": 3,
          "title": "Loki Log Volume (5m)",
          "type": "timeseries",
          "datasource": "Loki",
          "gridPos": {
            "h": 8,
            "w": 24,
            "x": 0,
            "y": 8
          },
          "targets": [
            {
              "expr": "sum(count_over_time({job=\"kubernetes-pods\", namespace=\"realtime-dev\"}[5m]))",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          }
        }
      ]
    }
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "realtime-app.fullname" . }}-promtail-config
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: promtail
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    positions:
      filename: /run/promtail/positions.yaml
    clients:
      - url: http://{{ include "realtime-app.fullname" . }}-loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: kubernetes-pods
        static_configs:
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: realtime-dev
              __path__: /var/log/pods/realtime-dev_*/*/*.log
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "realtime-app.fullname" . }}-prometheus
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: prometheus
spec:
  replicas: {{ .Values.observability.prometheus.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "realtime-app.name" . }}
      app.kubernetes.io/component: observability
      app.kubernetes.io/part: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "realtime-app.name" . }}
        app.kubernetes.io/component: observability
        app.kubernetes.io/part: prometheus
    spec:
      containers:
        - name: prometheus
          image: {{ .Values.observability.prometheus.image.repository }}:{{ .Values.observability.prometheus.image.tag }}
          imagePullPolicy: {{ .Values.observability.prometheus.image.pullPolicy }}
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: {{ include "realtime-app.fullname" . }}-prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "realtime-app.fullname" . }}-loki
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: loki
spec:
  replicas: {{ .Values.observability.loki.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "realtime-app.name" . }}
      app.kubernetes.io/component: observability
      app.kubernetes.io/part: loki
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "realtime-app.name" . }}
        app.kubernetes.io/component: observability
        app.kubernetes.io/part: loki
    spec:
      containers:
        - name: loki
          image: {{ .Values.observability.loki.image.repository }}:{{ .Values.observability.loki.image.tag }}
          imagePullPolicy: {{ .Values.observability.loki.image.pullPolicy }}
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - containerPort: 3100
          volumeMounts:
            - name: config
              mountPath: /etc/loki/loki.yaml
              subPath: loki.yaml
            - name: data
              mountPath: /loki
      volumes:
        - name: config
          configMap:
            name: {{ include "realtime-app.fullname" . }}-loki-config
        - name: data
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "realtime-app.fullname" . }}-grafana
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: grafana
spec:
  replicas: {{ .Values.observability.grafana.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "realtime-app.name" . }}
      app.kubernetes.io/component: observability
      app.kubernetes.io/part: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "realtime-app.name" . }}
        app.kubernetes.io/component: observability
        app.kubernetes.io/part: grafana
    spec:
      containers:
        - name: grafana
          image: {{ .Values.observability.grafana.image.repository }}:{{ .Values.observability.grafana.image.tag }}
          imagePullPolicy: {{ .Values.observability.grafana.image.pullPolicy }}
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: {{ .Values.observability.grafana.adminUser | quote }}
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: {{ .Values.observability.grafana.adminPassword | quote }}
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: dashboard-starter
              mountPath: /var/lib/grafana/dashboards/realtime-starter.json
              subPath: realtime-starter.json
      volumes:
        - name: datasources
          configMap:
            name: {{ include "realtime-app.fullname" . }}-grafana-datasources
        - name: dashboard-provider
          configMap:
            name: {{ include "realtime-app.fullname" . }}-grafana-dashboard-provider
        - name: dashboard-starter
          configMap:
            name: {{ include "realtime-app.fullname" . }}-grafana-dashboard-starter
{{- if .Values.observability.promtail.enabled }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "realtime-app.fullname" . }}-promtail
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: promtail
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "realtime-app.name" . }}
      app.kubernetes.io/component: observability
      app.kubernetes.io/part: promtail
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "realtime-app.name" . }}
        app.kubernetes.io/component: observability
        app.kubernetes.io/part: promtail
    spec:
      containers:
        - name: promtail
          image: {{ .Values.observability.promtail.image.repository }}:{{ .Values.observability.promtail.image.tag }}
          imagePullPolicy: {{ .Values.observability.promtail.image.pullPolicy }}
          args:
            - -config.file=/etc/promtail/promtail.yaml
          ports:
            - containerPort: 9080
          volumeMounts:
            - name: config
              mountPath: /etc/promtail/promtail.yaml
              subPath: promtail.yaml
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: run
              mountPath: /run/promtail
      volumes:
        - name: config
          configMap:
            name: {{ include "realtime-app.fullname" . }}-promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: run
          emptyDir: {}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "realtime-app.fullname" . }}-prometheus
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: prometheus
spec:
  type: {{ .Values.observability.prometheus.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: prometheus
  ports:
    - name: http
      port: {{ .Values.observability.prometheus.service.port }}
      targetPort: 9090
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "realtime-app.fullname" . }}-loki
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: loki
spec:
  type: {{ .Values.observability.loki.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: loki
  ports:
    - name: http
      port: {{ .Values.observability.loki.service.port }}
      targetPort: 3100
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "realtime-app.fullname" . }}-grafana
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: grafana
spec:
  type: {{ .Values.observability.grafana.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: observability
    app.kubernetes.io/part: grafana
  ports:
    - name: http
      port: {{ .Values.observability.grafana.service.port }}
      targetPort: 3000
{{- end }}
