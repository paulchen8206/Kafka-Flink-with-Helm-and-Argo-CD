{{- if .Values.mdm.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "realtime-app.fullname" . }}-mdm-config
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: mdm
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS mdm;

    USE mdm;

    CREATE TABLE IF NOT EXISTS customer360 (
      customer_id VARCHAR(64) PRIMARY KEY,
      customer_name VARCHAR(255) NOT NULL,
      customer_email VARCHAR(255) NOT NULL,
      customer_segment VARCHAR(64) NOT NULL,
      currency VARCHAR(8) NOT NULL DEFAULT 'USD',
      first_order_timestamp DATETIME NULL,
      last_order_timestamp DATETIME NULL,
      projected_order_count INT NOT NULL DEFAULT 0,
      projected_total_spent DECIMAL(18,2) NOT NULL DEFAULT 0.00,
      projection_updated_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
      updated_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS product_master (
      product_id VARCHAR(64) PRIMARY KEY,
      product_name VARCHAR(255) NOT NULL,
      currency VARCHAR(8) NOT NULL DEFAULT 'USD',
      first_seen_at DATETIME NULL,
      last_seen_at DATETIME NULL,
      orders_count INT NOT NULL DEFAULT 0,
      units_sold INT NOT NULL DEFAULT 0,
      avg_unit_price DECIMAL(18,2) NOT NULL DEFAULT 0.00,
      updated_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS mdm_date (
      date_key INT PRIMARY KEY,
      full_date DATE NOT NULL,
      day_of_month TINYINT NOT NULL,
      day_of_week TINYINT NOT NULL,
      day_name VARCHAR(16) NOT NULL,
      week_of_year TINYINT NOT NULL,
      month_of_year TINYINT NOT NULL,
      month_name VARCHAR(16) NOT NULL,
      quarter_of_year TINYINT NOT NULL,
      year_number SMALLINT NOT NULL,
      is_weekend BOOLEAN NOT NULL,
      created_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
      updated_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      UNIQUE KEY uq_mdm_date_full_date (full_date)
    );

    INSERT IGNORE INTO customer360 (
      customer_id,
      customer_name,
      customer_email,
      customer_segment,
      currency,
      first_order_timestamp,
      last_order_timestamp,
      projected_order_count,
      projected_total_spent
    ) VALUES
      ('CUST-1001', 'Ava Chen', 'ava.chen@example.com', 'MID_MARKET', 'USD', '2026-01-15 09:30:00', '2026-04-16 17:20:00', 18, 3250.50),
      ('CUST-1002', 'Liam Patel', 'liam.patel@example.com', 'SMB', 'USD', '2026-02-03 11:10:00', '2026-04-14 10:05:00', 9, 980.75),
      ('CUST-1003', 'Sophia Nguyen', 'sophia.nguyen@example.com', 'ENTERPRISE', 'USD', '2026-01-28 14:40:00', '2026-04-17 13:30:00', 33, 7890.00),
      ('CUST-1004', 'Noah Brown', 'noah.brown@example.com', 'MID_MARKET', 'USD', '2026-03-12 08:55:00', '2026-04-15 16:45:00', 14, 2425.10);

    INSERT IGNORE INTO product_master (
      product_id,
      product_name,
      currency,
      first_seen_at,
      last_seen_at,
      orders_count,
      units_sold,
      avg_unit_price
    ) VALUES
      ('SKU-100', 'Wireless Mouse', 'USD', '2026-01-05 09:00:00', '2026-04-16 12:10:00', 52, 78, 24.99),
      ('SKU-101', 'Mechanical Keyboard', 'USD', '2026-01-07 09:00:00', '2026-04-16 15:20:00', 61, 74, 89.50),
      ('SKU-102', '4K Monitor', 'USD', '2026-01-10 09:00:00', '2026-04-17 10:40:00', 47, 49, 329.00),
      ('SKU-103', 'USB-C Dock', 'USD', '2026-01-12 09:00:00', '2026-04-17 11:50:00', 39, 46, 159.95),
      ('SKU-104', 'Noise Cancelling Headset', 'USD', '2026-01-15 09:00:00', '2026-04-16 18:30:00', 58, 65, 199.99);

    INSERT IGNORE INTO mdm_date (
      date_key,
      full_date,
      day_of_month,
      day_of_week,
      day_name,
      week_of_year,
      month_of_year,
      month_name,
      quarter_of_year,
      year_number,
      is_weekend
    ) VALUES
      (20260414, '2026-04-14', 14, 3, 'Tuesday', 16, 4, 'April', 2, 2026, false),
      (20260415, '2026-04-15', 15, 4, 'Wednesday', 16, 4, 'April', 2, 2026, false),
      (20260416, '2026-04-16', 16, 5, 'Thursday', 16, 4, 'April', 2, 2026, false),
      (20260417, '2026-04-17', 17, 6, 'Friday', 16, 4, 'April', 2, 2026, false),
      (20260418, '2026-04-18', 18, 7, 'Saturday', 16, 4, 'April', 2, 2026, true),
      (20260419, '2026-04-19', 19, 1, 'Sunday', 16, 4, 'April', 2, 2026, true),
      (20260420, '2026-04-20', 20, 2, 'Monday', 17, 4, 'April', 2, 2026, false);
  register-mdm-connectors.sh: |
    #!/usr/bin/env sh

    set -eu

    CONNECT_URL="${CONNECT_URL:-http://{{ include "realtime-app.fullname" . }}-mdm-connect:8083}"

    until curl -sf "${CONNECT_URL}/connectors" >/dev/null; do
      echo "Waiting for MDM Debezium Connect REST API..."
      sleep 3
    done

    if curl -sf "${CONNECT_URL}/connectors/debezium-mysql-mdm" >/dev/null; then
      curl -sf -X PUT \
        -H "Content-Type: application/json" \
        --data @/connector-configs/debezium-mysql-mdm.json \
        "${CONNECT_URL}/connectors/debezium-mysql-mdm/config" >/dev/null
    else
      curl -sf -X POST \
        -H "Content-Type: application/json" \
        --data "{\"name\":\"debezium-mysql-mdm\",\"config\":$(cat /connector-configs/debezium-mysql-mdm.json)}" \
        "${CONNECT_URL}/connectors" >/dev/null
    fi

    echo "Debezium MDM connector is registered."
  debezium-mysql-mdm.json: |
    {
      "connector.class": "io.debezium.connector.mysql.MySqlConnector",
      "tasks.max": "1",
      "database.hostname": "{{ include "realtime-app.fullname" . }}-mysql-mdm",
      "database.port": "3306",
      "database.user": "root",
      "database.password": "{{ .Values.mdm.mysql.rootPassword }}",
      "database.server.id": "5401",
      "topic.prefix": "mdm_mysql",
      "database.include.list": "{{ .Values.mdm.mysql.database }}",
      "table.include.list": "{{ .Values.mdm.mysql.database }}.customer360,{{ .Values.mdm.mysql.database }}.product_master",
      "include.schema.changes": "false",
      "snapshot.mode": "initial",
      "decimal.handling.mode": "string",
      "time.precision.mode": "connect",
      "schema.history.internal": "io.debezium.storage.file.history.FileSchemaHistory",
      "schema.history.internal.file.filename": "/tmp/debezium-mdm-schemahistory.dat"
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "realtime-app.fullname" . }}-mysql-mdm
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: mysql-mdm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "realtime-app.name" . }}
      app.kubernetes.io/component: mysql-mdm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "realtime-app.name" . }}
        app.kubernetes.io/component: mysql-mdm
    spec:
      containers:
        - name: mysql-mdm
          image: {{ .Values.mdm.mysql.image.repository }}:{{ .Values.mdm.mysql.image.tag }}
          imagePullPolicy: {{ .Values.mdm.mysql.image.pullPolicy }}
          args:
            - --server-id={{ .Values.mdm.mysql.serverId }}
            - --log-bin=mysql-bin
            - --binlog-format=ROW
            - --binlog-row-image=FULL
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: {{ .Values.mdm.mysql.rootPassword | quote }}
            - name: MYSQL_DATABASE
              value: {{ .Values.mdm.mysql.database | quote }}
          ports:
            - containerPort: 3306
          volumeMounts:
            - name: data
              mountPath: /var/lib/mysql
            - name: init
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
      volumes:
        - name: data
          emptyDir: {}
        - name: init
          configMap:
            name: {{ include "realtime-app.fullname" . }}-mdm-config
            items:
              - key: init.sql
                path: init.sql
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "realtime-app.fullname" . }}-mysql-mdm
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: mysql-mdm
spec:
  type: {{ .Values.mdm.mysql.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: mysql-mdm
  ports:
    - name: mysql
      port: {{ .Values.mdm.mysql.service.port }}
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "realtime-app.fullname" . }}-mdm-writer
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: mdm-writer
spec:
  replicas: {{ .Values.mdm.writer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "realtime-app.name" . }}
      app.kubernetes.io/component: mdm-writer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "realtime-app.name" . }}
        app.kubernetes.io/component: mdm-writer
    spec:
      containers:
        - name: mdm-writer
          image: {{ .Values.mdm.writer.image.repository }}:{{ .Values.mdm.writer.image.tag }}
          imagePullPolicy: {{ .Values.mdm.writer.image.pullPolicy }}
          env:
            - name: MDM_MYSQL_HOST
              value: {{ printf "%s-mysql-mdm" (include "realtime-app.fullname" .) | quote }}
            - name: MDM_MYSQL_PORT
              value: {{ .Values.mdm.mysql.service.port | quote }}
            - name: MDM_MYSQL_USER
              value: root
            - name: MDM_MYSQL_PASSWORD
              value: {{ .Values.mdm.mysql.rootPassword | quote }}
            - name: MDM_MYSQL_DB
              value: {{ .Values.mdm.mysql.database | quote }}
            - name: MDM_WRITE_INTERVAL_MS
              value: {{ .Values.mdm.writer.writeIntervalMs | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "realtime-app.fullname" . }}-mdm-connect
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: mdm-connect
spec:
  replicas: {{ .Values.mdm.connect.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "realtime-app.name" . }}
      app.kubernetes.io/component: mdm-connect
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "realtime-app.name" . }}
        app.kubernetes.io/component: mdm-connect
    spec:
      containers:
        - name: mdm-connect
          image: {{ .Values.mdm.connect.image.repository }}:{{ .Values.mdm.connect.image.tag }}
          imagePullPolicy: {{ .Values.mdm.connect.image.pullPolicy }}
          ports:
            - containerPort: 8083
          env:
            - name: BOOTSTRAP_SERVERS
              value: {{ .Values.kafkaBootstrapServers | quote }}
            - name: GROUP_ID
              value: {{ .Values.mdm.connect.groupId | quote }}
            - name: CONFIG_STORAGE_TOPIC
              value: {{ .Values.mdm.connect.configStorageTopic | quote }}
            - name: OFFSET_STORAGE_TOPIC
              value: {{ .Values.mdm.connect.offsetStorageTopic | quote }}
            - name: STATUS_STORAGE_TOPIC
              value: {{ .Values.mdm.connect.statusStorageTopic | quote }}
            - name: KEY_CONVERTER
              value: org.apache.kafka.connect.storage.StringConverter
            - name: VALUE_CONVERTER
              value: org.apache.kafka.connect.json.JsonConverter
            - name: VALUE_CONVERTER_SCHEMAS_ENABLE
              value: "false"
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "realtime-app.fullname" . }}-mdm-connect
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: mdm-connect
spec:
  type: {{ .Values.mdm.connect.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: mdm-connect
  ports:
    - name: http
      port: {{ .Values.mdm.connect.service.port }}
      targetPort: 8083
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "realtime-app.fullname" . }}-mdm-connect-init
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: mdm-connect-init
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "realtime-app.name" . }}
        app.kubernetes.io/component: mdm-connect-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mdm-connect-init
          image: {{ .Values.mdm.connect.curlImage.repository }}:{{ .Values.mdm.connect.curlImage.tag }}
          imagePullPolicy: {{ .Values.mdm.connect.curlImage.pullPolicy }}
          command: ["/bin/sh", "/scripts/register-mdm-connectors.sh"]
          volumeMounts:
            - name: mdm-config
              mountPath: /scripts/register-mdm-connectors.sh
              subPath: register-mdm-connectors.sh
            - name: connector-configs
              mountPath: /connector-configs
      volumes:
        - name: mdm-config
          configMap:
            name: {{ include "realtime-app.fullname" . }}-mdm-config
            defaultMode: 0755
            items:
              - key: register-mdm-connectors.sh
                path: register-mdm-connectors.sh
        - name: connector-configs
          configMap:
            name: {{ include "realtime-app.fullname" . }}-mdm-config
            items:
              - key: debezium-mysql-mdm.json
                path: debezium-mysql-mdm.json
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "realtime-app.fullname" . }}-mdm-cdc-producer
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: mdm-cdc-producer
spec:
  replicas: {{ .Values.mdm.cdcProducer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "realtime-app.name" . }}
      app.kubernetes.io/component: mdm-cdc-producer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "realtime-app.name" . }}
        app.kubernetes.io/component: mdm-cdc-producer
    spec:
      containers:
        - name: mdm-cdc-producer
          image: {{ .Values.mdm.cdcProducer.image.repository }}:{{ .Values.mdm.cdcProducer.image.tag }}
          imagePullPolicy: {{ .Values.mdm.cdcProducer.image.pullPolicy }}
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafkaBootstrapServers | quote }}
            - name: MDM_CDC_GROUP_ID
              value: {{ .Values.mdm.cdcProducer.groupId | quote }}
            - name: CDC_CONSUMER_OFFSET_RESET
              value: {{ .Values.mdm.cdcProducer.offsetReset | quote }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "realtime-app.fullname" . }}-mdm-pyspark-sync
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: mdm-pyspark-sync
spec:
  replicas: {{ .Values.mdm.pysparkSync.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "realtime-app.name" . }}
      app.kubernetes.io/component: mdm-pyspark-sync
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "realtime-app.name" . }}
        app.kubernetes.io/component: mdm-pyspark-sync
    spec:
      containers:
        - name: mdm-pyspark-sync
          image: {{ .Values.mdm.pysparkSync.image.repository }}:{{ .Values.mdm.pysparkSync.image.tag }}
          imagePullPolicy: {{ .Values.mdm.pysparkSync.image.pullPolicy }}
          command:
            - /opt/spark/bin/spark-submit
            - --conf
            - spark.jars.ivy=/tmp/.ivy
            - --packages
            - org.postgresql:postgresql:42.7.4,com.mysql:mysql-connector-j:8.4.0
            - /app/main.py
          env:
            - name: MDM_MYSQL_HOST
              value: {{ printf "%s-mysql-mdm" (include "realtime-app.fullname" .) | quote }}
            - name: MDM_MYSQL_PORT
              value: {{ .Values.mdm.mysql.service.port | quote }}
            - name: MDM_MYSQL_DB
              value: {{ .Values.mdm.mysql.database | quote }}
            - name: MDM_MYSQL_USER
              value: root
            - name: MDM_MYSQL_PASSWORD
              value: {{ .Values.mdm.mysql.rootPassword | quote }}
            - name: POSTGRES_HOST
              value: {{ printf "%s-postgres" (include "realtime-app.fullname" .) | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.postgres.service.port | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.auth.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.auth.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgres.auth.password | quote }}
            - name: MDM_SYNC_INTERVAL_SEC
              value: {{ .Values.mdm.pysparkSync.syncIntervalSec | quote }}
{{- end }}
