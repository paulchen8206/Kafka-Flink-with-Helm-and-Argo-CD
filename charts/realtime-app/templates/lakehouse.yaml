{{- if or .Values.postgres.enabled .Values.connect.enabled .Values.dbt.enabled .Values.airflow.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "realtime-app.fullname" . }}-warehouse-config
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: warehouse
data:
  init.sql: |
    create schema if not exists landing;
    create schema if not exists bronze;
    create schema if not exists silver;
    create schema if not exists gold;

    create table if not exists landing.sales_order (
      orderid text,
      ordertimestamp timestamptz,
      customerid text,
      customername text,
      customeremail text,
      customersegment text,
      currency text,
      ordertotal numeric,
      lineitemcount integer
    );

    create table if not exists landing.sales_order_line_item (
      orderid text,
      ordertimestamp timestamptz,
      customerid text,
      customername text,
      lineitemid text,
      sku text,
      productname text,
      quantity integer,
      unitprice numeric,
      linetotal numeric,
      currency text
    );

    create table if not exists landing.customer_sales (
      customerid text,
      customername text,
      customeremail text,
      customersegment text,
      ordercount bigint,
      totalspent numeric,
      lastorderid text,
      updatedat timestamptz,
      currency text
    );
  dbt_project.yml: |
    name: realtime_analytics
    version: 1.0.0
    config-version: 2
    profile: realtime_analytics
    model-paths: ["models"]
    target-path: target
    clean-targets: ["target", "dbt_packages"]
    models:
      realtime_analytics:
        +materialized: view
        bronze:
          +schema: bronze
        silver:
          +schema: silver
          +materialized: table
        gold:
          +schema: gold
          +materialized: table
  profiles.yml: |
    realtime_analytics:
      target: dev
      outputs:
        dev:
          type: postgres
          host: {{ include "realtime-app.fullname" . }}-postgres
          port: 5432
          user: {{ .Values.postgres.auth.user }}
          password: {{ .Values.postgres.auth.password }}
          dbname: {{ .Values.postgres.auth.database }}
          schema: public
          threads: 4
  stg_sales_order.sql: |
    select
      orderid as order_id,
      ordertimestamp as order_timestamp,
      customerid as customer_id,
      customername as customer_name,
      customeremail as customer_email,
      customersegment as customer_segment,
      currency,
      ordertotal::numeric as order_total,
      lineitemcount::int as line_item_count
    from landing.sales_order
  stg_sales_order_line_item.sql: |
    select
      orderid as order_id,
      ordertimestamp as order_timestamp,
      customerid as customer_id,
      customername as customer_name,
      lineitemid as line_item_id,
      sku,
      productname as product_name,
      quantity::int as quantity,
      unitprice::numeric as unit_price,
      linetotal::numeric as line_total,
      currency
    from landing.sales_order_line_item
  stg_customer_sales.sql: |
    select
      customerid as customer_id,
      customername as customer_name,
      customeremail as customer_email,
      customersegment as customer_segment,
      ordercount::bigint as order_count,
      totalspent::numeric as total_spent,
      lastorderid as last_order_id,
      updatedat as updated_at,
      currency
    from landing.customer_sales
  gold_customer_sales_summary.sql: |
    with sales as (
      select * from {{ "{{" }} ref('stg_customer_sales') {{ "}}" }}
    ),
    orders as (
      select * from {{ "{{" }} ref('stg_sales_order') {{ "}}" }}
    ),
    line_items as (
      select * from {{ "{{" }} ref('stg_sales_order_line_item') {{ "}}" }}
    ),
    line_item_rollup as (
      select
        customer_id,
        sum(line_total) as line_item_total,
        count(*) as total_line_items,
        max(order_timestamp) as last_line_item_at
      from line_items
      group by customer_id
    )
    select
      s.customer_id,
      max(s.customer_name) as customer_name,
      max(s.customer_email) as customer_email,
      max(s.customer_segment) as customer_segment,
      max(s.currency) as currency,
      max(s.order_count) as latest_order_count,
      max(s.total_spent) as latest_total_spent,
      coalesce(l.line_item_total, 0) as recomputed_total_from_line_items,
      coalesce(l.total_line_items, 0) as total_line_items,
      count(distinct o.order_id) as observed_orders,
      max(o.order_timestamp) as last_order_timestamp,
      max(s.updated_at) as projection_updated_at,
      max(l.last_line_item_at) as last_line_item_timestamp
    from sales s
    left join orders o
      on s.customer_id = o.customer_id
    left join line_item_rollup l
      on s.customer_id = l.customer_id
    group by s.customer_id, l.line_item_total, l.total_line_items
{{- end }}

{{- if .Values.minio.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "realtime-app.fullname" . }}-minio-init
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: minio
data:
  init-minio.sh: |
    #!/usr/bin/env sh
    set -eu

    until mc alias set local http://{{ include "realtime-app.fullname" . }}-minio:9000 {{ .Values.minio.rootUser }} {{ .Values.minio.rootPassword }} >/dev/null 2>&1; do
      echo "Waiting for MinIO to accept connections..."
      sleep 2
    done

    mc mb --ignore-existing local/{{ .Values.minio.bucket }}
    mc anonymous set private local/{{ .Values.minio.bucket }} >/dev/null 2>&1 || true

    echo "MinIO warehouse bucket ready: {{ .Values.minio.bucket }}"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "realtime-app.fullname" . }}-minio
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "realtime-app.name" . }}
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "realtime-app.name" . }}
        app.kubernetes.io/component: minio
    spec:
      containers:
        - name: minio
          image: {{ .Values.minio.image.repository }}:{{ .Values.minio.image.tag }}
          imagePullPolicy: {{ .Values.minio.image.pullPolicy }}
          args:
            - server
            - /data
            - --console-address
            - :9001
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.rootUser | quote }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ .Values.minio.rootPassword | quote }}
          ports:
            - containerPort: 9000
            - containerPort: 9001
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "realtime-app.fullname" . }}-minio
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: minio
spec:
  type: {{ .Values.minio.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: minio
  ports:
    - name: api
      port: {{ .Values.minio.service.apiPort }}
      targetPort: 9000
    - name: console
      port: {{ .Values.minio.service.consolePort }}
      targetPort: 9001
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "realtime-app.fullname" . }}-minio-init
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: minio-init
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "realtime-app.name" . }}
        app.kubernetes.io/component: minio-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: minio-init
          image: {{ .Values.minio.mcImage.repository }}:{{ .Values.minio.mcImage.tag }}
          imagePullPolicy: {{ .Values.minio.mcImage.pullPolicy }}
          command: ["/bin/sh", "/scripts/init-minio.sh"]
          volumeMounts:
            - name: script
              mountPath: /scripts/init-minio.sh
              subPath: init-minio.sh
      volumes:
        - name: script
          configMap:
            name: {{ include "realtime-app.fullname" . }}-minio-init
            defaultMode: 0755
{{- end }}

