{{- if .Values.trino.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "realtime-app.fullname" . }}-trino-config
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: trino
data:
  config.properties: |
    coordinator=true
    node-scheduler.include-coordinator=true
    http-server.http.port=8080
    discovery.uri=http://localhost:8080
  node.properties: |
    node.environment=kubernetes
    node.id={{ include "realtime-app.fullname" . }}-trino
    node.data-dir=/data/trino
  jvm.config: |
    -server
    -Xmx2G
    -XX:+UseG1GC
    -XX:G1HeapRegionSize=32M
    -XX:+ExplicitGCInvokesConcurrent
    -XX:+ExitOnOutOfMemoryError
    -Djdk.attach.allowAttachSelf=true
  lakehouse.properties: |
    connector.name=iceberg
    iceberg.catalog.type=jdbc
    iceberg.jdbc-catalog.catalog-name=lakehouse
    iceberg.jdbc-catalog.driver-class=org.postgresql.Driver
    iceberg.jdbc-catalog.connection-url=jdbc:postgresql://{{ include "realtime-app.fullname" . }}-postgres:5432/{{ .Values.postgres.auth.database }}
    iceberg.jdbc-catalog.connection-user={{ .Values.postgres.auth.user }}
    iceberg.jdbc-catalog.connection-password={{ .Values.postgres.auth.password }}
    iceberg.jdbc-catalog.default-warehouse-dir=s3://{{ .Values.minio.bucket }}/iceberg
    iceberg.jdbc-catalog.schema-version=V1
    iceberg.file-format=PARQUET
    iceberg.unique-table-location=true
    iceberg.register-table-procedure.enabled=true
    fs.native-s3.enabled=true
    s3.endpoint=http://{{ include "realtime-app.fullname" . }}-minio:{{ .Values.minio.service.apiPort }}
    s3.region=us-east-1
    s3.path-style-access=true
    s3.aws-access-key={{ .Values.minio.rootUser }}
    s3.aws-secret-key={{ .Values.minio.rootPassword }}
  warehouse.properties: |
    connector.name=postgresql
    connection-url=jdbc:postgresql://{{ include "realtime-app.fullname" . }}-postgres:5432/{{ .Values.postgres.auth.database }}
    connection-user={{ .Values.postgres.auth.user }}
    connection-password={{ .Values.postgres.auth.password }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "realtime-app.fullname" . }}-trino
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: trino
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "realtime-app.name" . }}
      app.kubernetes.io/component: trino
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "realtime-app.name" . }}
        app.kubernetes.io/component: trino
    spec:
      containers:
        - name: trino
          image: {{ .Values.trino.image.repository }}:{{ .Values.trino.image.tag }}
          imagePullPolicy: {{ .Values.trino.image.pullPolicy }}
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: trino-config
              mountPath: /etc/trino/config.properties
              subPath: config.properties
            - name: trino-config
              mountPath: /etc/trino/node.properties
              subPath: node.properties
            - name: trino-config
              mountPath: /etc/trino/jvm.config
              subPath: jvm.config
            - name: trino-config
              mountPath: /etc/trino/catalog/lakehouse.properties
              subPath: lakehouse.properties
            - name: trino-config
              mountPath: /etc/trino/catalog/warehouse.properties
              subPath: warehouse.properties
      volumes:
        - name: trino-config
          configMap:
            name: {{ include "realtime-app.fullname" . }}-trino-config
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "realtime-app.fullname" . }}-trino
  labels:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: trino
spec:
  type: {{ .Values.trino.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "realtime-app.name" . }}
    app.kubernetes.io/component: trino
  ports:
    - name: http
      port: {{ .Values.trino.service.port }}
      targetPort: 8080
{{- end }}