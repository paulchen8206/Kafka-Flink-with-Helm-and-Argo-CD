connector.name=iceberg
iceberg.catalog.type=jdbc
iceberg.jdbc-catalog.catalog-name=lakehouse
iceberg.jdbc-catalog.driver-class=org.postgresql.Driver
iceberg.jdbc-catalog.connection-url=jdbc:postgresql://postgres:5432/analytics
iceberg.jdbc-catalog.connection-user=analytics
iceberg.jdbc-catalog.connection-password=analytics
iceberg.jdbc-catalog.default-warehouse-dir=s3://warehouse/iceberg
iceberg.jdbc-catalog.schema-version=V1
iceberg.file-format=PARQUET
iceberg.unique-table-location=true
iceberg.register-table-procedure.enabled=true
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.region=us-east-1
s3.path-style-access=true
s3.aws-access-key=minio
s3.aws-secret-key=minio123