source:
  type: airflow
  serviceName: airflow-orchestration
  serviceConnection:
    config:
      type: Airflow
      hostPort: http://airflow:8080
      connection:
        type: SQLite
        databaseMode: /opt/airflow/airflow.db
  sourceConfig:
    config:
      type: PipelineMetadata
      includeLineage: true

sink:
  type: metadata-rest
  config:
    api_endpoint: http://openmetadata-server:8585/api

